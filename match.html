<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>試合詳細｜Watch杯</title>
<meta name="description" content="W杯2026の試合詳細。日本時間キックオフ・放送・配信・スタジアム情報。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800;900&family=Bricolage+Grotesque:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=3">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#bc002d">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Watch杯">
<style>
.backlink{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--ink-3);text-decoration:none;margin-top:14px}
.teamlink{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;margin-bottom:8px;border-radius:10px;background:var(--surface);box-shadow:0 0 0 1px var(--line-2);text-decoration:none;color:inherit}
.teamlink:hover{box-shadow:0 0 0 1.5px var(--accent)}
.teamlink img{width:26px;height:26px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
</style>
</head>
<body>

<main class="wrap">
  <a class="backlink" href="javascript:history.length>1?history.back():location.assign('schedule.html')">← 戻る</a>
  <div id="content"></div>
</main>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="teams.js"></script>
<script src="app.js?v=3"></script>
<script>
injectChrome("schedule");
const mid = new URLSearchParams(location.search).get("id");
const M = MATCHES.find(x=>x.id===mid);
const el = document.getElementById("content");

if(!M){
  el.innerHTML = `<p style="padding:40px 0;text-align:center;color:var(--ink-3);font-weight:700">試合が見つかりません。<a href="schedule.html" style="color:var(--accent)">全試合日程へ</a></p>`;
}else{
  const st = matchState(M);
  const d = new Date(M.kick);
  document.title = `${M.t[0].n} vs ${M.t[1].n}（${M.kick.slice(5,7)*1}/${M.kick.slice(8,10)*1} 日本時間${M.kick.slice(11,16)}）｜Watch杯`;
  const [stageTxt, city] = M.info.split(" · ");
  const byName = {}; Object.values(TEAMS).forEach(t=>byName[t.name]=t.code);

  const team = t=>{
    const img = t.f ? `<img src="${FLAG(t.f)}" alt="${t.n}">` : `<span class="noflag">?</span>`;
    return `<div class="hero-team">${img}<div class="name">${t.n}</div>${t.r?`<div style="font-size:10px;color:#ffffff80;font-weight:800;margin-top:3px">FIFA ${t.r}位</div>`:""}</div>`;
  };
  const late = M.late ? `<div class="latebox"><span class="ld">${M.lateday} 深夜</span><br><span class="lt">${M.late}</span></div>` : "";
  const badge = st==="live" ? "🔴 LIVE NOW" : st==="past" ? "試合終了" : "KICK OFF";

  // チーム詳細リンク（出場国データにある場合のみ）
  const teamLinks = M.t.filter(t=>byName[t.n]).map(t=>`
    <a class="teamlink" href="team.html?c=${byName[t.n]}">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="${FLAG(t.f)}" alt="">
        <span style="font-size:13px;font-weight:800">${t.n} の代表メンバー・チーム情報</span>
      </div><span style="font-size:16px;color:var(--ink-3)">→</span>
    </a>`).join("");

  // 同グループの順位表
  const gMatch = stageTxt.match(/^グループ([A-L])$/);
  const groupHTML = gMatch ? `
    <div class="sec-label">GROUP ${gMatch[1]}</div>
    <h2 class="pagehead" style="margin-top:0;font-size:18px">グループ${gMatch[1]} 順位表</h2>
    ${groupTableHTML(gMatch[1], GROUPS[gMatch[1]], {qline:true})}` : "";

  // 同日のほかの試合
  const sameDay = MATCHES.filter(x=>x.kick.slice(0,10)===M.kick.slice(0,10) && x.id!==M.id);
  const sameDayHTML = sameDay.length ? `
    <div class="sec-label">SAME DAY</div>
    <h2 class="pagehead" style="margin-top:0;font-size:18px">同じ日のほかの試合</h2>
    <div class="mlist">${sameDay.map(x=>matchCardHTML(x)).join("")}</div>` : "";

  el.innerHTML = `
  <div class="hero" style="margin-top:10px">
    <div class="roofline"><i></i><i></i><i></i></div>
    <svg class="pitch" viewBox="0 0 700 320" preserveAspectRatio="none">
      <rect x="20" y="20" width="660" height="280" fill="none" stroke="#fff" stroke-width="1.5"/>
      <line x1="350" y1="20" x2="350" y2="300" stroke="#fff" stroke-width="1.5"/>
      <circle cx="350" cy="160" r="55" fill="none" stroke="#fff" stroke-width="1.5"/>
    </svg>
    <div class="hero-inner">
      <div class="hero-top">
        <span class="badge-next">${badge}</span>
        <span class="sub">${stageTxt}${M.jp?"・日本戦":""}</span>
      </div>
      <div class="hero-main">
        ${team(M.t[0])}
        <div class="hero-center">
          <div class="date">${d.getMonth()+1}月${d.getDate()}日 <small>(${WEEKDAYS[d.getDay()]})</small></div>
          ${M.score
            ? `<div class="lbl">FULL TIME</div><div class="time">${M.score[0]} - ${M.score[1]}</div><div style="font-size:11px;color:#ffffff80;font-weight:700">キックオフ 日本時間 ${M.kick.slice(11,16)}</div>`
            : `<div class="lbl">日本時間</div><div class="time">${M.kick.slice(11,16)}</div>${late}`}
        </div>
        ${team(M.t[1])}
      </div>
      <div class="hero-bottom">
        <div>
          <div class="lbl">ここで見られる</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${M.tv.map(pillHTML).join("")}</div>
          <div class="hero-venue">${venueLabel(city)}</div>
        </div>
        <button class="btn-detail" data-cal="${M.id}">📅 カレンダー登録</button>
      </div>
    </div>
  </div>

  ${teamLinks ? `<div class="sec-label">TEAMS</div>${teamLinks}` : ""}
  ${prCardHTML(M.tv.includes("DAZN無料")?"dazn":"dmm")}
  ${groupHTML}
  ${sameDayHTML}`;

  bindCalButtons(el);
  linkifyStandings(el);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>優勝予想メーカー｜48カ国104試合を全部予想｜Watch杯</title>
<meta name="description" content="W杯2026の優勝国を予想しよう。グループ順位→3位サバイバル→決勝まで全部タップで予想してXでシェア。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800;900&family=Bricolage+Grotesque:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=3">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#bc002d">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Watch杯">
<style>
.bk-groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.bk-g{background:var(--surface);border-radius:12px;box-shadow:0 0 0 1px var(--line);padding:12px}
.bk-g.full{box-shadow:0 0 0 1.5px #0e7a3d66}
.bk-g h3{margin:0 0 8px;font-size:12px;font-family:var(--font-num);font-weight:900;letter-spacing:.06em;display:flex;justify-content:space-between;color:var(--ink-2)}
.bk-g h3 .ok{color:#0e7a3d}
.bk-t{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700}
.bk-t:hover{background:var(--bg-2)}
.bk-t img{width:20px;height:20px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.bk-t .rk{min-width:34px;text-align:center;font-size:10px;font-weight:900;border-radius:6px;padding:2px 0;background:var(--bg-2);color:var(--ink-3)}
.bk-t.r1 .rk{background:var(--accent);color:#fff}
.bk-t.r2 .rk{background:var(--ink-1);color:#fff}
.bk-t.r3 .rk{background:#b45309;color:#fff}
.bk-t.r4{opacity:.45}
.chips3{display:flex;flex-wrap:wrap;gap:8px}
.chip3{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;border-radius:999px;padding:7px 13px;cursor:pointer;background:var(--surface);box-shadow:0 0 0 1px var(--line-2);color:var(--ink-2);border:none;font-family:var(--font-jp)}
.chip3 img{width:16px;height:16px;border-radius:50%}
.chip3.on{box-shadow:0 0 0 1.5px #0e7a3d;background:#0e7a3d0d;color:#0e7a3d}
.bk-round{font-size:13px;font-weight:900;color:var(--accent);letter-spacing:.08em;margin:20px 0 8px;display:flex;gap:8px;align-items:baseline}
.bk-round small{color:var(--ink-3);font-weight:700;letter-spacing:0}
.bk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}
.bk-grid.final{grid-template-columns:1fr;max-width:420px}
.bm{background:var(--surface);border-radius:12px;box-shadow:0 0 0 1px var(--line);overflow:hidden}
.bm .mid{font-size:9px;color:var(--ink-3);padding:5px 11px 0;font-weight:800;letter-spacing:.06em;font-family:var(--font-num)}
.bteam{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:13.5px;font-weight:700;border-left:3px solid transparent}
.bteam img{width:20px;height:20px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.bteam:hover{background:var(--bg-2)}
.bteam.win{background:#bc002d0d;border-left-color:var(--accent);font-weight:900}
.bteam.lose{opacity:.4;text-decoration:line-through}
.bteam.tbd{color:var(--ink-3);cursor:default;font-weight:600}
.bk-result{border:1.5px solid var(--accent);border-radius:16px;background:var(--surface);padding:22px 16px;text-align:center;margin-top:22px}
.bk-result .crown{font-size:36px}
.bk-result .champ{font-size:clamp(22px,5vw,32px);font-weight:900;margin:4px 0;display:flex;align-items:center;justify-content:center;gap:10px}
.bk-result .champ img{width:44px;height:44px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.bk-result .sub{font-size:12px;color:var(--ink-3);font-weight:700}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink-1);color:#fff;font-weight:800;font-size:13px;border-radius:999px;padding:10px 20px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none}
</style>
</head>
<body>

<main class="wrap">
  <h1 class="pagehead">優勝予想メーカー</h1>
  <p class="pagesub">グループ順位 → 3位サバイバル → 決勝まで、48カ国104試合を全部タップで予想。結果はXでシェア。</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
    <button class="btn-detail" id="btnAuto" style="background:var(--accent);color:#fff;font-size:13px">⚡ 全部おまかせで一気に優勝まで見る</button>
    <button class="btn-detail" id="btnReset" style="background:var(--bg-2);font-size:13px;color:var(--accent)">🗑 リセット</button>
  </div>

  <div class="sec-label">STEP 1</div>
  <h2 class="pagehead" style="margin-top:0;font-size:18px">グループ順位を予想 <span id="s1done" class="hidden" style="color:#0e7a3d">✓</span></h2>
  <p class="pagesub">チームを<b style="color:var(--accent)">1位→2位→3位→4位の順にタップ</b>。もう一度タップで解除。</p>
  <div class="bk-groups" id="groupGrid"></div>

  <section id="step2" class="hidden">
    <div class="sec-label">STEP 2</div>
    <h2 class="pagehead" style="margin-top:0;font-size:18px">3位サバイバル <span id="s2done" class="hidden" style="color:#0e7a3d">✓</span></h2>
    <p class="pagesub">12組の3位のうち<b style="color:var(--accent)">成績上位8チームだけ</b>が決勝トーナメント進出（2026年新ルール）。生き残る8チームを選ぼう。</p>
    <div class="chips3" id="thirdChips"></div>
    <p style="font-size:13px;font-weight:900;color:var(--accent);margin:10px 0" id="thirdCount"></p>
  </section>

  <section id="step3" class="hidden">
    <div class="sec-label">STEP 3</div>
    <h2 class="pagehead" style="margin-top:0;font-size:18px">決勝トーナメント</h2>
    <p class="pagesub">勝つチームをタップ。組み合わせはFIFA公式のブラケット構造どおり。</p>
    <div id="bracketArea"></div>
    <div id="resultArea"></div>
  </section>

  <div id="newsArea" style="margin-top:6px"></div>
  <div id="pr" style="margin-top:12px"></div>
</main>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="news.js"></script>
<script src="app.js?v=3"></script>
<script>
injectChrome("bracket");
// 予想の参考になる最新情報（怪我・離脱・結果速報）
document.getElementById("newsArea").innerHTML = newsListHTML(5);
document.getElementById("pr").innerHTML = prCardHTML("dazn");

// ===== チームデータ（data.jsのGROUPSから48カ国を構成）=====
const G_ORDER = ["A","B","C","D","E","F","G","H","I","J","K","L"];
const BK = {}; // gid -> [{id,n,f}]
G_ORDER.forEach(g=>{ BK[g] = GROUPS[g].map((t,i)=>({id:g+i, n:t.n, f:t.f})); });
const TEAM = {}; Object.values(BK).flat().forEach(t=>TEAM[t.id]=t);
const JAPAN = Object.values(TEAM).find(t=>t.n==="日本").id;

// ===== ブラケット構造（FIFA公式）=====
const R32 = [
  [73,"2A","2B"],[74,"1E","T74"],[75,"1F","2C"],[76,"1C","2F"],
  [77,"1I","T77"],[78,"2E","2I"],[79,"1A","T79"],[80,"1L","T80"],
  [81,"1D","T81"],[82,"1G","T82"],[83,"2K","2L"],[84,"1H","2J"],
  [85,"1B","T85"],[86,"1J","2H"],[87,"1K","T87"],[88,"2D","2G"]
];
const THIRD_SLOTS = {74:"ABCDF",77:"CDFGH",79:"CEFHI",80:"EHIJK",81:"BEFIJ",82:"AEHIJ",85:"EFGIJ",87:"DEIJL"};
const R16 = [[89,74,77],[90,73,75],[91,76,78],[92,79,80],[93,83,84],[94,81,82],[95,86,88],[96,85,87]];
const QF  = [[97,89,90],[98,93,94],[99,91,92],[100,95,96]];
const SF  = [[101,97,98],[102,99,100]];
const FIN = [[104,101,102]];

// ===== state =====
let st = JSON.parse(localStorage.getItem("wc26bracket2")||"null") || { ranks:{}, thirds:[], picks:{} };
const save = ()=>localStorage.setItem("wc26bracket2",JSON.stringify(st));
const $ = id=>document.getElementById(id);
const toast = msg=>{const t=$("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);};
const groupsDone = ()=>G_ORDER.every(g=>(st.ranks[g]||[]).length===4);
const thirdsDone = ()=>st.thirds.length===8;

// 3位スロット割り当て（バックトラッキング）
function assignThirds(){
  if(!thirdsDone()) return null;
  const slots = Object.entries(THIRD_SLOTS).map(([m,allowed])=>({m:+m,allowed}))
    .sort((a,b)=>[...a.allowed].filter(g=>st.thirds.includes(g)).length - [...b.allowed].filter(g=>st.thirds.includes(g)).length);
  const used = new Set(), out = {};
  function bt(i){
    if(i===slots.length) return true;
    for(const g of st.thirds){
      if(used.has(g)||!slots[i].allowed.includes(g)) continue;
      used.add(g); out[slots[i].m]=g;
      if(bt(i+1)) return true;
      used.delete(g); delete out[slots[i].m];
    }
    return false;
  }
  if(bt(0)) return out;
  const rest=[...st.thirds]; const o={};
  Object.keys(THIRD_SLOTS).forEach(m=>o[m]=rest.shift());
  return o;
}
function resolve(){
  const slots = {};
  if(groupsDone()){
    G_ORDER.forEach(g=>{ slots["1"+g]=st.ranks[g][0]; slots["2"+g]=st.ranks[g][1]; });
  }
  const ta = assignThirds();
  if(ta) Object.entries(ta).forEach(([m,g])=>slots["T"+m]=st.ranks[g][2]);
  const ms = {};
  const w = id=>ms[id]&&ms[id].winner||null;
  R32.forEach(([id,h,a])=>ms[id]={home:slots[h]||null,away:slots[a]||null});
  const fill = ()=>[R16,QF,SF,FIN].forEach(r=>r.forEach(([id,m1,m2])=>{
    ms[id]={home:w(m1),away:w(m2)};
    const p=st.picks[id];
    if(p&&(p===ms[id].home||p===ms[id].away)) ms[id].winner=p;
  }));
  R32.forEach(([id])=>{
    const p=st.picks[id];
    if(p&&(p===ms[id].home||p===ms[id].away)) ms[id].winner=p;
    else delete st.picks[id];
  });
  fill(); fill(); fill(); fill(); // 4ラウンド分伝播
  return ms;
}

function render(){
  // STEP1
  const grid=$("groupGrid"); grid.innerHTML="";
  G_ORDER.forEach(g=>{
    const r=st.ranks[g]||[];
    const card=document.createElement("div");
    card.className="bk-g"+(r.length===4?" full":"");
    card.innerHTML=`<h3>GROUP ${g} ${r.length===4?'<span class="ok">✓</span>':`<span>${r.length}/4</span>`}</h3>`;
    BK[g].forEach(t=>{
      const pos=r.indexOf(t.id);
      const row=document.createElement("div");
      row.className="bk-t"+(pos>=0?" r"+(pos+1):"");
      row.innerHTML=`<span class="rk">${pos>=0?(pos+1)+"位":"—"}</span><img src="${FLAG(t.f)}" alt=""><span>${t.n}</span>`;
      row.onclick=()=>{
        const arr=st.ranks[g]=st.ranks[g]||[];
        const j=arr.indexOf(t.id);
        if(j>=0) arr.splice(j,1); else if(arr.length<4) arr.push(t.id);
        st.thirds=st.thirds.filter(gg=>st.ranks[gg]&&st.ranks[gg].length===4);
        save(); render();
      };
      card.appendChild(row);
    });
    grid.appendChild(card);
  });
  $("s1done").classList.toggle("hidden",!groupsDone());

  // STEP2
  $("step2").classList.toggle("hidden",!groupsDone());
  if(groupsDone()){
    const chips=$("thirdChips"); chips.innerHTML="";
    G_ORDER.forEach(g=>{
      const t=TEAM[st.ranks[g][2]];
      const c=document.createElement("button");
      c.className="chip3"+(st.thirds.includes(g)?" on":"");
      c.innerHTML=`<img src="${FLAG(t.f)}" alt="">${t.n}<span style="font-size:9px;color:var(--ink-3)">${g}組3位</span>`;
      c.onclick=()=>{
        const i=st.thirds.indexOf(g);
        if(i>=0) st.thirds.splice(i,1);
        else if(st.thirds.length<8) st.thirds.push(g);
        else toast("8チームまで！どれか外してね");
        save(); render();
      };
      chips.appendChild(c);
    });
    $("thirdCount").textContent=`生き残り ${st.thirds.length} / 8 チーム`;
    $("s2done").classList.toggle("hidden",!thirdsDone());
  }

  // STEP3
  const ready=groupsDone()&&thirdsDone();
  $("step3").classList.toggle("hidden",!ready);
  if(ready){
    const ms=resolve();
    const area=$("bracketArea"); area.innerHTML="";
    [["32強 ROUND OF 32","6/28〜7/3",R32],["16強 ROUND OF 16","7/4〜7/7",R16],["8強 準々決勝","7/9〜7/11",QF],["4強 準決勝","7/14・7/15",SF],["🏆 決勝","現地7/19（日本時間7/20朝）",FIN]].forEach(([title,date,round])=>{
      area.insertAdjacentHTML("beforeend",`<div class="bk-round">${title} <small>${date}</small></div>`);
      const box=document.createElement("div");
      box.className="bk-grid"+(round===FIN?" final":"");
      round.forEach(([id])=>{
        const m=ms[id];
        const el=document.createElement("div");
        el.className="bm";
        el.innerHTML=`<div class="mid">MATCH ${id}</div>`;
        [m.home,m.away].forEach(tid=>{
          const d=document.createElement("div");
          if(!tid){ d.className="bteam tbd"; d.innerHTML=`<span style="width:20px;text-align:center">❓</span> 勝者未定`; }
          else{
            const t=TEAM[tid];
            d.className="bteam"+(m.winner?(m.winner===tid?" win":" lose"):"");
            d.innerHTML=`<img src="${FLAG(t.f)}" alt=""> ${t.n}`;
            d.onclick=()=>{ st.picks[id]=tid; save(); render(); };
          }
          el.appendChild(d);
        });
        box.appendChild(el);
      });
      area.appendChild(box);
    });
    renderResult(ms);
  } else $("resultArea").innerHTML="";
}

function renderResult(ms){
  const area=$("resultArea");
  const champ=ms[104]&&ms[104].winner;
  if(!champ){ area.innerHTML=""; return; }
  const t=TEAM[champ];
  const runner=TEAM[ms[104].home===champ?ms[104].away:ms[104].home];
  let jp="グループステージ敗退 😢";
  const jg=JAPAN[0];
  const jr=(st.ranks[jg]||[]).indexOf(JAPAN);
  if(jr===0||jr===1||(jr===2&&st.thirds.includes(jg))){
    jp="ベスト32";
    [...R32,...R16,...QF,...SF,...FIN].forEach(([id])=>{
      if(ms[id].winner===JAPAN){
        if(R32.some(x=>x[0]===id))jp="ベスト16";
        else if(R16.some(x=>x[0]===id))jp="ベスト8";
        else if(QF.some(x=>x[0]===id))jp="ベスト4";
        else if(SF.some(x=>x[0]===id))jp="決勝進出 🥈";
        else if(id===104)jp="優勝 🏆";
      }
    });
  }
  const sf=[ms[101].home,ms[101].away,ms[102].home,ms[102].away].filter(Boolean).map(id=>TEAM[id].n).join("・");
  const text=`⚽️ W杯2026 ぼくの優勝予想\n\n🏆 優勝: ${t.n}\n🥈 準優勝: ${runner.n}\n💪 4強: ${sf}\n🇯🇵 日本: ${jp}\n\n#W杯2026 #優勝予想`;
  area.innerHTML=`
    <div class="bk-result">
      <div class="crown">👑</div>
      <div class="champ"><img src="${FLAG(t.f)}" alt="">${t.n}</div>
      <div class="sub">あなたの優勝予想 ｜ 準優勝: ${runner.n}</div>
      <div style="margin-top:8px;font-size:13px;font-weight:900;color:var(--accent)">🇯🇵 あなたの予想での日本: ${jp}</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap">
        <button class="btn-detail" id="btnX" style="background:var(--ink-1);color:#fff">𝕏 でシェア</button>
        <button class="btn-detail" id="btnCopy" style="background:var(--bg-2)">📋 結果をコピー</button>
      </div>
    </div>`;
  $("btnX").onclick=()=>window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(text),"_blank");
  $("btnCopy").onclick=async()=>{ await navigator.clipboard.writeText(text); toast("コピーした！友達に送りつけろ"); };
}

// おまかせ＆リセット
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
$("btnAuto").onclick=()=>{
  G_ORDER.forEach(g=>{
    const arr=st.ranks[g]=st.ranks[g]||[];
    const rest=shuffle(BK[g].map(t=>t.id).filter(id=>!arr.includes(id)));
    while(arr.length<4) arr.push(rest.shift());
  });
  if(st.thirds.length<8){
    const rest=shuffle(G_ORDER.filter(g=>!st.thirds.includes(g)));
    while(st.thirds.length<8) st.thirds.push(rest.shift());
  }
  for(let pass=0;pass<5;pass++){
    const ms=resolve();
    [...R32,...R16,...QF,...SF,...FIN].forEach(([id])=>{
      if(!st.picks[id]&&ms[id].home&&ms[id].away) st.picks[id]=Math.random()<.5?ms[id].home:ms[id].away;
    });
  }
  save(); render();
  toast("⚡ 一気に優勝まで決めた！気に入らないとこをタップで直そう");
  $("step3").scrollIntoView({behavior:"smooth"});
};
$("btnReset").onclick=()=>{
  if(!confirm("予想を全部リセットする？")) return;
  st={ranks:{},thirds:[],picks:{}}; save(); render();
};
render();
</script>
</body>
</html>

    <div style="font-size:14px;font-weight:900;margin-bottom:8px">日本戦はすべて無料で見られる</div>

      第1戦オランダ戦・第3戦スウェーデン戦は<b>NHK総合</b>、第2戦チュニジア戦は<b>日本テレビ系</b>で地上波生中継。
      さらに<b>DAZNでは日本戦全試合が無料配信</b>される。詳しい視聴方法は<a href="shindan.html" style="color:var(--accent);font-weight:800">視聴診断</a>で30秒でわかる。

<script src="config.js"></script>
<script src="data.js"></script>
<script src="teams.js"></script>

<script src="app.js?v=3"></script>
<script>
injectChrome("japan");
document.getElementById("groupF").innerHTML = groupTableHTML("F", GROUPS.F, {qline:true});
linkifyStandings(document.getElementById("groupF"));

// 突破条件（残り試合を全列挙して自動判定）— FEATURES.qualifyで表示切替
const jpQ = FEATURES.qualify ? qualifyGroup("F").find(q=>q.n==="日本") : null;
if(jpQ){
  const msg = {
    "突破確定":"🎉 日本は2位以内が確定。決勝トーナメント進出！",
    "敗退確定":"😢 日本はグループ4位が確定…",
    "3位進出に望み":"😬 2位以内の可能性は消滅。3位で上位8チームに入れれば進出。",
    "自力突破圏":"💪 日本は残り試合に勝てば自力で2位以内＝突破できる。",
    "突破可能性あり（他力）":"🙏 自力突破は消滅。他会場の結果次第で突破の可能性あり。",
  }[jpQ.label] || "";
  document.getElementById("qualifyBox").innerHTML = `
    <div class="card" style="border-left:3px solid var(--accent)">
      <div style="font-size:10px;font-weight:900;letter-spacing:.12em;color:var(--accent);margin-bottom:4px">突破条件（自動計算）</div>
      <div style="font-size:14px;font-weight:900">${msg}</div>
      <div style="margin:8px -14px -8px">${qualifyChipsHTML("F")}</div>
      <div style="font-size:10px;color:var(--ink-3);font-weight:700;margin-top:8px">※勝点のみで全シナリオを計算（得失点差は未考慮）。順位表データ基準。</div>
    </div>`;
}
// ニュース
document.getElementById("newsArea").innerHTML = newsListHTML(6);
const jpMs = MATCHES.filter(m=>m.jp);
document.getElementById("jpMatches").innerHTML = jpMs.map((m,i)=>{
  const d = new Date(m.kick);
  const w = WEEKDAYS[d.getDay()];
  return `<div style="margin-bottom:14px">
    <div class="datehead" style="margin:14px 0 8px">
      <span class="stage">第${i+1}戦</span>
      <div class="d" style="font-size:26px">${d.getMonth()+1}.${d.getDate()}</div>
      <div class="w" style="font-size:14px">${w}曜</div>
      <div class="rule"></div>
    </div>
    ${matchCardHTML(m)}
  </div>`;
}).join("");
bindCalButtons(document.getElementById("jpMatches"));
document.getElementById("pr").innerHTML = prCardHTML();
</script>
